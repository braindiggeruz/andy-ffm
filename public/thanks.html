<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyurtmangiz uchun rahmat!</title>
  <link rel="stylesheet" href="style.css">

  <!-- Meta Pixel Code (init handled by scripts/app.js via /api/config) -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',

  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .thanks-card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
    }
    .thanks-icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #79b717;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #fff;
    }
    .thanks-title {
      font-size: 28px;
      font-weight: 800;
      color: #1a2e22;
      margin-bottom: 14px;
      line-height: 1.2;
    }
    .thanks-text {
      font-size: 17px;
      line-height: 1.5;
      color: #445;
      margin-bottom: 24px;
    }
    .thanks-note {
      font-size: 14px;
      color: #79b717;
      font-weight: 700;
    }
    body { background: #f2f6f0; }
  </style>
</head>
<body data-page="thanks">
  <div class="thanks-wrap">
    <div class="thanks-card" data-testid="thanks-card">
      <div class="thanks-icon">&#10003;</div>
      <h1 class="thanks-title" data-testid="thanks-title">Buyurtmangiz uchun rahmat!</h1>
      <p class="thanks-text">
        Sizning arizangiz muvaffaqiyatli yuborildi!<br>
        Biz siz bilan tez orada bog&#8216;lanamiz.
      </p>
      <p class="thanks-note">Telefoningizni yoningizda saqlang &#128222;</p>
    </div>
  </div>
  <script src="scripts/app.js"></script>
</body>
</html>
