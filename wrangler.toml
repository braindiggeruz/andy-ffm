# Cloudflare Pages — andy-ffm (socks.savdomix.uz)
# Production runtime: Cloudflare Pages + Pages Functions
# Do NOT put secrets in this file. Configure them via Cloudflare dashboard or
# `wrangler pages secret put` (server-side only).

name = "andy-ffm"
pages_build_output_dir = "public"
compatibility_date = "2026-06-26"
compatibility_flags = ["nodejs_compat"]

# Non-secret defaults visible to the build. All secrets must be set via
# `wrangler pages secret put` or the Cloudflare dashboard (never committed):
#   BUYO_API_TOKEN
#   META_CAPI_ACCESS_TOKEN
[vars]
META_PIXEL_ID = "2935651803447339"
BUYO_API_BASE = "https://api.buyo.network"
BUYO_FLOW_ID = "qo16l2ULfR6c"
BUYO_MOCK_MODE = "false"
PRODUCT_VALUE_UZS = "135000"
PRODUCT_SALE_PCT = "60"
PRODUCT_CURRENCY = "UZS"
PRODUCT_CONTENT_NAME = "Barmoqli paypoqlar (3 juft)"
PRODUCT_CONTENT_ID = "socks-with-toes-v1"

# D1 audit DB (lead dedup + funnel audit + webhook payload log).
# Must be declared here: wrangler pages deploy uses this file as the source of
# truth for bindings and ignores dashboard-configured ones.
[[d1_databases]]
binding = "AUDIT_DB"
database_name = "savdomix-socks-audit"
database_id = "1ff27b93-94da-4258-b439-1b6863e94f00"

[env.preview.vars]
META_PIXEL_ID = "2935651803447339"
BUYO_API_BASE = "https://api.buyo.network"
BUYO_FLOW_ID = "qo16l2ULfR6c"
BUYO_MOCK_MODE = "true"
PRODUCT_VALUE_UZS = "135000"
PRODUCT_SALE_PCT = "60"
PRODUCT_CURRENCY = "UZS"
PRODUCT_CONTENT_NAME = "Barmoqli paypoqlar (3 juft)"
PRODUCT_CONTENT_ID = "socks-with-toes-v1"

[[env.preview.d1_databases]]
binding = "AUDIT_DB"
database_name = "savdomix-socks-audit"
database_id = "1ff27b93-94da-4258-b439-1b6863e94f00"
